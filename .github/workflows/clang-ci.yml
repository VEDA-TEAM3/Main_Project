name: C/C++ CI Pipeline

on:
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - '**/*.c'
      - '**/*.cpp'
      - '**/*.h'
      - '**/CMakeLists.txt'

jobs:
  clang-format:
    name: clang-format
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-18

      - name: Check formatting
        run: |
          FILES=$(find . \
            -type f \( \
              -name "*.c" -o \
              -name "*.cpp" -o \
              -name "*.h" -o \
            \) \
            -not -path "./build/*" \
            -not -path "./device-rpi/kernel/*" \
            -not -path "./.git/*")

          if [ -z "$FILES" ]; then
            echo "No C/C++ files found."
            exit 0
          fi

          clang-format-18 --dry-run --Werror $FILES

  clang-tidy:
    name: clang-tidy
    runs-on: self-hosted
    env:
      CC: gcc-10
      CXX: g++-10
      OPENCV_VERSION: 4.10.0

    steps:
      - uses: actions/checkout@v4

      - name: Configure runner cache paths
        run: echo "OPENCV_INSTALL_DIR=${RUNNER_TOOL_CACHE}/opencv/4.10.0-gcc10" >> "$GITHUB_ENV"

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ca-certificates \
            clang-tidy \
            curl \
            g++-10 \
            gcc-10 \
            git \
            gzip \
            libcurl4-openssl-dev \
            libmicrohttpd-dev \
            libmosquitto-dev \
            libsqlite3-dev \
            libssl-dev \
            ninja-build \
            nlohmann-json3-dev \
            pkg-config \
            tar

      - name: Configure CMake
        run: |
          test -x /snap/bin/cmake
          echo "/snap/bin" >> "$GITHUB_PATH"
          /snap/bin/cmake --version
          "$CC" --version
          "$CXX" --version

      - name: Prepare runner OpenCV cache
        run: |
          config_dir="${OPENCV_INSTALL_DIR}/lib/cmake/opencv4"
          if [[ -f "${config_dir}/OpenCVConfig.cmake" && \
                -f "${config_dir}/OpenCVConfig-version.cmake" ]]; then
            echo "Using runner-cached OpenCV ${OPENCV_VERSION} from ${OPENCV_INSTALL_DIR}"
          else
            bash .github/scripts/install-opencv.sh "${OPENCV_VERSION}" "${OPENCV_INSTALL_DIR}"
          fi

      - name: Verify OpenCV installation
        run: |
          config_dir="${OPENCV_INSTALL_DIR}/lib/cmake/opencv4"
          test -f "${config_dir}/OpenCVConfig.cmake"
          test -f "${config_dir}/OpenCVConfig-version.cmake"

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DOpenCV_DIR:PATH="${OPENCV_INSTALL_DIR}/lib/cmake/opencv4"

      - name: Run clang-tidy
        run: |
          find . \
            -type f \( \
              -name "*.c" -o \
              -name "*.cpp" -o \
            \) \
            -not -path "./build/*" \
            -not -path "./.git/*" \
            -not -path "./.opencv/*" \
            -not -path "./control-center/*" \
            -not -path "./device-rpi/kernel/*" \
            -not -path "./stm32/*" \
            -not -path "./tmp/*" \
            -print0 | xargs -0 clang-tidy --quiet -p build

  build:
    runs-on: self-hosted
    env:
      CC: gcc-10
      CXX: g++-10
      OPENCV_VERSION: 4.10.0

    steps:
      - uses: actions/checkout@v4

      - name: Configure runner cache paths
        run: echo "OPENCV_INSTALL_DIR=${RUNNER_TOOL_CACHE}/opencv/4.10.0-gcc10" >> "$GITHUB_ENV"

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ca-certificates \
            curl \
            g++-10 \
            gcc-10 \
            git \
            gzip \
            libcurl4-openssl-dev \
            libmicrohttpd-dev \
            libmosquitto-dev \
            libsqlite3-dev \
            libssl-dev \
            ninja-build \
            nlohmann-json3-dev \
            pkg-config \
            tar

      - name: Configure CMake
        run: |
          test -x /snap/bin/cmake
          echo "/snap/bin" >> "$GITHUB_PATH"
          /snap/bin/cmake --version
          "$CC" --version
          "$CXX" --version

      - name: Prepare runner OpenCV cache
        run: |
          config_dir="${OPENCV_INSTALL_DIR}/lib/cmake/opencv4"
          if [[ -f "${config_dir}/OpenCVConfig.cmake" && \
                -f "${config_dir}/OpenCVConfig-version.cmake" ]]; then
            echo "Using runner-cached OpenCV ${OPENCV_VERSION} from ${OPENCV_INSTALL_DIR}"
          else
            bash .github/scripts/install-opencv.sh "${OPENCV_VERSION}" "${OPENCV_INSTALL_DIR}"
          fi

      - name: Verify OpenCV installation
        run: |
          config_dir="${OPENCV_INSTALL_DIR}/lib/cmake/opencv4"
          test -f "${config_dir}/OpenCVConfig.cmake"
          test -f "${config_dir}/OpenCVConfig-version.cmake"

      - name: Configure
        run: |
          cmake -S . -B build \
            -DOpenCV_DIR:PATH="${OPENCV_INSTALL_DIR}/lib/cmake/opencv4"

      - name: Build
        run: cmake --build build --parallel 2