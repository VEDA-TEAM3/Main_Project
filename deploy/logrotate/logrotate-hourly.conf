# /etc/systemd/system/logrotate.timer.d/hourly.conf
#
# veda-compute 의 'hourly' 회전을 실제로 동작시키기 위한 타이머 오버라이드.
# 배포판 기본 logrotate.timer 는 하루 1회만 돌기 때문에, 이 오버라이드가 없으면
# veda-compute 설정의 'hourly' 는 아무 효과가 없다 (하루에 한 번만 검사됨).
#
# [ 오해 방지 ] 타이머를 hourly 로 바꿔도 다른 로그가 시간별로 회전되지는 않는다.
# logrotate 는 '실행될 때마다' 각 설정의 자체 주기(daily/weekly/monthly)를 검사해
# 아직 주기가 안 됐으면 건너뛴다. 즉 실행 빈도만 올라가고 회전 정책은 그대로다.
#
# 적용:
#   sudo mkdir -p /etc/systemd/system/logrotate.timer.d
#   sudo cp logrotate-hourly.conf /etc/systemd/system/logrotate.timer.d/hourly.conf
#   sudo systemctl daemon-reload && sudo systemctl restart logrotate.timer
#   systemctl list-timers logrotate.timer      # 다음 실행 시각 확인
#
# 검증 (실제로 회전하지 않고 동작만 확인):
#   sudo logrotate -d /etc/logrotate.d/veda-compute      # dry-run
#   sudo logrotate -f /etc/logrotate.d/veda-compute      # 강제 1회 실행

[Timer]
# 빈 값으로 한 번 리셋하지 않으면 기본 OnCalendar 에 '추가'되어 둘 다 유효해진다
OnCalendar=
OnCalendar=hourly
AccuracySec=1m
Persistent=true
